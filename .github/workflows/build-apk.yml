name: Build Debug APK

on:
  push:
    branches:
      - claude/fitness-app-architecture-2YLIs
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Create google-services.json
        run: |
          cat > android/app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "levelbot-demo",
              "storage_bucket": "levelbot-demo.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "com.levelbot.app"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "PLACEHOLDER_KEY"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Create firebase_options.dart
        run: |
          cat > lib/firebase_options.dart << 'EOF'
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart' show defaultTargetPlatform, kIsWeb, TargetPlatform;

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              switch (defaultTargetPlatform) {
                case TargetPlatform.android:
                  return android;
                case TargetPlatform.iOS:
                  return ios;
                default:
                  return android;
              }
            }

            static const FirebaseOptions android = FirebaseOptions(
              apiKey: 'PLACEHOLDER',
              appId: '1:000000000000:android:0000000000000000',
              messagingSenderId: '000000000000',
              projectId: 'levelbot-demo',
              storageBucket: 'levelbot-demo.appspot.com',
            );

            static const FirebaseOptions ios = FirebaseOptions(
              apiKey: 'PLACEHOLDER',
              appId: '1:000000000000:ios:0000000000000000',
              messagingSenderId: '000000000000',
              projectId: 'levelbot-demo',
              storageBucket: 'levelbot-demo.appspot.com',
              iosBundleId: 'com.levelbot.app',
            );
          }
          EOF

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build Debug APK
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LevelBot-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
